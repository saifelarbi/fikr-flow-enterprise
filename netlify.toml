[build]
  base = "frontend"
  command = "npm run build"
  publish = ".next"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NEXT_PUBLIC_API_URL = "https://fikr-flow-backend.up.railway.app/api"

[context.production.environment]
  NEXT_PUBLIC_API_URL = "https://fikr-flow-backend.up.railway.app/api"

[context.deploy-preview.environment]
  NEXT_PUBLIC_API_URL = "https://fikr-flow-backend.up.railway.app/api"
